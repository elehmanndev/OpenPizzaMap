name: Backfill Socials

# Daily Instagram/Facebook URL backfill. For each visible place with a
# websiteUrl, fetches the homepage and harvests social anchors (header
# + footer almost always link the venue's own IG/FB).
#
# At 300 places/run × ~800ms polite delay = ~4 min runtime. The 1,605
# website-having backlog drains in ~5 days; after that the cron handles
# newly-imported places + re-tries the long tail of sites that initially
# returned 5xx / Cloudflare challenge.
#
# Fill-only-if-null: never overwrites a value already in the DB. Safe
# to re-run indefinitely. No external API keys — everything is plain
# HTTP fetches of the places' own homepages.
#
# Required secrets: DATABASE_URL.

on:
  schedule:
    # Daily at 03:00 UTC. Off-peak and clear of the other crons:
    #   :00 batch-enrich, :15 osm-enrich, :30 batch-enrich-burn,
    #   02:30 backfill-tripadvisor.
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Backfill Instagram + Facebook URLs from place websites
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/backfills/backfill-socials-from-website.js --apply --limit=300
