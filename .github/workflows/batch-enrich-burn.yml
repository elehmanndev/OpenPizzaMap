name: Batch Enrich (Burn Mode)

# Aggressive ramp-up of the enrichment pipeline. Designed to drain Eric's
# expiring 200€ GCP free credit; runs alongside the conservative
# `batch-enrich.yml` workflow.
#
# When the credit is gone (or the $1 budget tripwire fires), DISABLE this
# workflow in GitHub Actions UI — the conservative one will keep running
# and stay inside the per-SKU monthly free tier.
#
# Throughput: 24 runs/day × 60 rows = up to 1,440 places/day through the
# full pipeline (vs 160/day on the conservative workflow). Cache layer
# in EnrichmentCache + google-reviews-cache.json makes overlapping runs
# with the conservative workflow safe — duplicates hit cache, not API.
#
# See memory: project_credit_burn_2026-05-10.md for revert instructions.

on:
  schedule:
    # Hourly at :30 to never collide on the hour mark with the conservative
    # 3-hourly cron that fires at :00.
    - cron: '30 * * * *'
  workflow_dispatch: # manual trigger from GitHub UI

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore reviews cache
        uses: actions/cache@v4
        with:
          path: data/cache/google-reviews-cache.json
          key: reviews-cache-burn-${{ github.run_id }}
          restore-keys: |
            reviews-cache-burn-
            reviews-cache-

      - name: Restore gmaps resolve cache
        uses: actions/cache@v4
        with:
          path: data/cache/gmaps-resolve-cache.json
          key: gmaps-resolve-cache-burn-${{ github.run_id }}
          restore-keys: |
            gmaps-resolve-cache-burn-
            gmaps-resolve-cache-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Enrich new rows (60/run)
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "x-api-key: ${{ secrets.ADMIN_API_KEY }}" \
            "https://openpizzamap.com/api/admin/batch-enrich?limit=60")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          echo "$body" | jq . 2>/dev/null || echo "$body"
          echo "HTTP status: $http_code"
          if [ "$http_code" != "200" ]; then
            echo "::warning::HTTP $http_code — will retry next scheduled run"
          fi

      - name: Backfill photos for enriched rows missing images (60/run)
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "x-api-key: ${{ secrets.ADMIN_API_KEY }}" \
            "https://openpizzamap.com/api/admin/batch-enrich?mode=photos&limit=60")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          echo "$body" | jq . 2>/dev/null || echo "$body"
          echo "HTTP status: $http_code"
          if [ "$http_code" != "200" ]; then
            echo "::warning::Photos HTTP $http_code — will retry next scheduled run"
          fi

      - name: Scrape reviews for newly enriched places (60/run)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: node scripts/scrapers/scrape-reviews.js --apply --limit=60

      - name: Generate descriptions from reviews (60/run, 1.1s delay)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_DELAY_MS: '1100'
        run: node scripts/enrichment/generate-descriptions.js --apply --limit=60

      - name: Clear non-review fallback descriptions
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "x-api-key: ${{ secrets.ADMIN_API_KEY }}" \
            "https://openpizzamap.com/api/admin/null-fallback-descriptions")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          echo "$body" | jq . 2>/dev/null || echo "$body"
          echo "HTTP status: $http_code"

      # Long-tail Playwright fallback. Capped at 20/run because Playwright
      # is slow (~3s/row) and GitHub IPs hit CAPTCHA more readily than
      # residential IPs do. Doesn't burn GCP credit (no API calls).
      - name: Playwright fallback (long-tail metadata + ratings)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/enrichment/resolve-via-gmaps.js --need-meta --apply --limit=20
        continue-on-error: true
