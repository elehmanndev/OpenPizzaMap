name: Batch Enrich

on:
  schedule:
    # Every 3 hours — 8 runs/day × 20 rows = 160 rows/day (155 RPD cap)
    - cron: '0 */3 * * *'
  workflow_dispatch: # manual trigger from GitHub UI

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore reviews cache
        uses: actions/cache@v4
        with:
          path: data/cache/google-reviews-cache.json
          key: reviews-cache-${{ github.run_id }}
          restore-keys: reviews-cache-

      - name: Restore gmaps resolve cache
        uses: actions/cache@v4
        with:
          path: data/cache/gmaps-resolve-cache.json
          key: gmaps-resolve-cache-${{ github.run_id }}
          restore-keys: gmaps-resolve-cache-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Enrich new rows
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "x-api-key: ${{ secrets.ADMIN_API_KEY }}" \
            "https://openpizzamap.com/api/admin/batch-enrich?limit=20")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          echo "$body" | jq . 2>/dev/null || echo "$body"
          echo "HTTP status: $http_code"
          if [ "$http_code" != "200" ]; then
            echo "::warning::HTTP $http_code — will retry next scheduled run"
          fi

      - name: Backfill photos for enriched rows missing images
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "x-api-key: ${{ secrets.ADMIN_API_KEY }}" \
            "https://openpizzamap.com/api/admin/batch-enrich?mode=photos&limit=20")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          echo "$body" | jq . 2>/dev/null || echo "$body"
          echo "HTTP status: $http_code"
          if [ "$http_code" != "200" ]; then
            echo "::warning::Photos HTTP $http_code — will retry next scheduled run"
          fi

      - name: Scrape reviews for newly enriched places
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: node scripts/scrapers/scrape-reviews.js --apply --limit=20
        continue-on-error: true # Hostinger MySQL flaps; next cron retries

      - name: Generate descriptions from reviews
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/enrichment/generate-descriptions.js --apply --limit=20
        continue-on-error: true # Hostinger MySQL flaps; next cron retries

      # Clear stale "fallback blurb" descriptions left behind by the old
      # website-fallback path in generate-descriptions.js. Idempotent: once
      # all descriptions match the "Pizza Lovers say:" prefix this is a
      # no-op. Safe to leave in the workflow indefinitely.
      - name: Clear non-review fallback descriptions
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "x-api-key: ${{ secrets.ADMIN_API_KEY }}" \
            "https://openpizzamap.com/api/admin/null-fallback-descriptions")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          echo "$body" | jq . 2>/dev/null || echo "$body"
          echo "HTTP status: $http_code"

      # Long-tail fallback: rows the Google Places API can't resolve
      # (small-town venues, name mismatches) often *do* exist on Google Maps
      # itself. Drive a real browser to scrape phone/website/hours/rating
      # from the place panel. Capped at 10/run because Playwright is slow
      # (~3s/row) and GitHub IPs hit CAPTCHA more readily than residential
      # IPs do.
      - name: Playwright fallback (long-tail metadata + ratings)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/enrichment/resolve-via-gmaps.js --need-meta --apply --limit=10
        continue-on-error: true
