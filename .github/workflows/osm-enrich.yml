name: OSM Enrich

# Hourly OpenStreetMap metadata fill-in. Queries the public Overpass API
# for venues near each place's coordinates, fills phone/website/hours/
# address where they're still null. Free, no auth required — Overpass is
# community-hosted infrastructure.
#
# Why this exists: Google's place panel often doesn't expose a website
# for small European pizzerias even when one exists in OSM (community-
# mapped). OSM is also the only source that's reliably venue-precise on
# coordinates — fixes centroid-fallback rows that the Playwright resolver
# can't help with.
#
# Etiquette baked into scripts/lib/osm.js:
#   - Identifying User-Agent
#   - 1.1s sleep between queries (sub-1qps)
#   - On-disk response cache (repeat lookups don't hit Overpass)
#   - Exponential backoff on 429 / 503 with mirror failover
#
# Throughput: 20 places/run × ~22s/run (1.1s × 20) × 24 runs/day = 480
# lookups/day. The visible-pizzeria backlog (~1700 places) drains in ~3.5
# days; after that the cron mostly serves new imports + retries.

on:
  schedule:
    # Hourly at :15. Offsets cleanly from batch-enrich.yml (:00) and
    # batch-enrich-burn.yml (:30) so the three workflows don't contend
    # for the same Hostinger DB connection.
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore osm resolve cache
        uses: actions/cache@v4
        with:
          path: data/cache/osm-resolve-cache.json
          key: osm-resolve-cache-${{ github.run_id }}
          restore-keys: osm-resolve-cache-

      - name: Fill metadata from OpenStreetMap
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/enrichment/enrich-osm.js --apply --limit=20
