name: Recompute OPM Rating

# Nightly recompute of Place.opmRating — the Bayesian blend of Google,
# TripAdvisor, Yelp and OPM community reviews defined in
# src/services/opm-rating.js.
#
# Why scheduled (vs. only on review-submit):
#   - Google review counts/ratings drift as the batch-enrich cron pulls
#     fresh data; the blend should track those shifts.
#   - TripAdvisor backfills (when wired) will add a second signal source
#     to many rows; nightly recompute picks them up automatically.
#   - The dataset-wide priorMean is recomputed each run, so as the
#     corpus grows the prior tightens around the true median.
#
# Cost: zero external API calls. The script is pure DB — one big SELECT,
# one cheap UPDATE per row whose rounded value actually changed.
# Idempotent — re-running the same day is a no-op.
#
# Runtime: ~1.5 min for ~1700 places (one UPDATE per drifted row over
# the Hostinger MySQL connection).

on:
  schedule:
    # Daily at 04:17 UTC. Off-peak; intentionally offset from the
    # batch-enrich crons (every :00 and :30) to avoid contending for
    # the DB connection.
    - cron: '17 4 * * *'
  workflow_dispatch:

jobs:
  recompute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Recompute opmRating across all places
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/backfills/backfill-opm-rating.js --apply
